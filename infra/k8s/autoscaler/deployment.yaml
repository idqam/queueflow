apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscaler
  namespace: queueflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autoscaler
  template:
    metadata:
      labels:
        app: autoscaler
    spec:
      serviceAccountName: autoscaler
      containers:
        - name: autoscaler
          image: ghcr.io/idqam/queueflow-autoscaler:latest
          envFrom:
            - secretRef:
                name: queueflow-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
