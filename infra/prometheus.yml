global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'queueflow-api'
    static_configs:
      - targets: ['host.docker.internal:9090']
  - job_name: 'queueflow-worker'
    static_configs:
      - targets: ['host.docker.internal:9091']
  - job_name: 'queueflow-autoscaler'
    static_configs:
      - targets: ['host.docker.internal:9092']
